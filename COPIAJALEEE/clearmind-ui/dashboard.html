<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">ClearMind Logic</div>
        <div class="header-nav">

    <div class="container">

        <div class="divider"></div>

        <div style="display: flex; flex-direction: column; gap: 24px; max-width: 300px;">

            <p style="font-size: 0.9rem;">No historical records found for this identity.</p>
        </div>
    </div>

    <script type="module">
        import { getUserStatus } from './services/api.js';

        const token = localStorage.getItem('cm_token') || 'demo_token';

        async function initDashboard() {
            try {
                // Mock API call visually:
                document.getElementById('validation-count').textContent = 'Remaining validations: 5';
            } catch (err) {
                console.error('Status fetch failed', err);
                document.getElementById('validation-count').textContent = 'Status: Offline';
            }
        }

        initDashboard();
    </script>

</html>
